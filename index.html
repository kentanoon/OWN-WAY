-size: 18px;\n    color: var(--gold);\n    margin-bottom: 32px;\n  }\n\n  .next-divider {\n    width: 40px;\n    height: 1px;\n    background: var(--gold);\n    margin: 0 auto 32px;\n  }\n\n  .next-desc {\n    font-size: 14px;\n    color: rgba(250,247,242,0.6);\n    line-height: 1.7;\n  }\n\n  /* ── FOOTER ── */\n  footer {\n    background: var(--ink);\n    border-top: 1px solid rgba(255,255,255,0.06);\n    padding: 24px;\n    text-align: center;\n    font-size: 11px;\n    color: rgba(250,247,242,0.3);\n    letter-spacing: 0.08em;\n  }\n\n  /* ── FADE-IN ANIMATION ── */\n  .fade-in {\n    opacity: 0;\n    transform: translateY(20px);\n    transition: opacity 0.7s ease, transform 0.7s ease;\n  }\n\n  .fade-in.visible {\n    opacity: 1;\n    transform: translateY(0);\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <p class=\"hero-label\">Discussion Session Report<\u002Fp>\n  <h1 class=\"hero-title\">おすすめしたい本は<br>何ですか？<\u002Fh1>\n  <p class=\"hero-sub\">ディスカッション会 議事録<\u002Fp>\n  <div class=\"hero-meta\">\n    <span>2026年4月18日（土）<\u002Fspan>\n    <span>14:00〜15:15<\u002Fspan>\n    <span>参加者 4名<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"scroll-hint\">scroll<\u002Fdiv>\n<\u002Fsection>\n\n<!-- PARTICIPANTS -->\n<section class=\"participants-section\">\n  <div class=\"participants-inner\">\n    <p class=\"section-eyebrow\">参加者<\u002Fp>\n    <div class=\"participants-grid\">\n      <div class=\"participant-card fade-in\">\n        <div class=\"participant-avatar\">し<\u002Fdiv>\n        <p class=\"participant-name\">しおりさん<\u002Fp>\n        <p class=\"participant-books-count\">2冊紹介<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"participant-card fade-in\">\n        <div class=\"participant-avatar\">K<\u002Fdiv>\n        <p class=\"participant-name\">KAORIさん<\u002Fp>\n        <p class=\"participant-books-count\">自叙伝を中心に<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"participant-card fade-in\">\n        <div class=\"participant-avatar\">え<\u002Fdiv>\n        <p class=\"participant-name\">えーいちさん<\u002Fp>\n        <p class=\"participant-books-count\">途中参加 · 1冊<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"participant-card fade-in\">\n        <div class=\"participant-avatar\">お<\u002Fdiv>\n        <p class=\"participant-name\">おかべさん<\u002Fp>\n        <p class=\"participant-books-count\">2冊紹介<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"section-divider\">\n\n<!-- SHIORI -->\n<section class=\"person-section\">\n  <div class=\"person-inner\">\n    <div class=\"person-header fade-in\">\n      <div class=\"person-name-block\">\n        <p class=\"section-eyebrow\">01<\u002Fp>\n        <h2 class=\"person-name\">しおりさん<\u002Fh2>\n        <p class=\"person-theme\">時間の使い方・集中力を高める本から、日常の行動を変えるヒントを共有。「読むだけで終わらせず、実際に試している」姿勢が印象的でした。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"person-num\">01<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"books-list\">\n      <div class=\"book-card fade-in\">\n        <div class=\"book-spine\">\n          <p class=\"book-spine-text\">脳のパフォーマンスを最大まで引き出す神・時間術<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"book-info\">\n          <p class=\"book-title\">脳のパフォーマンスを最大まで引き出す<br>神・時間術<\u002Fp>\n          <p class=\"book-author\">樺沢 紫苑 著<\u002Fp>\n          <p class=\"book-note\">朝の集中時間帯に重要な作業を入れ、昼食後は歩いて眠気をリセット。ToDoリストで頭の中を整理するなど、すぐに実践できる内容が詰まっています。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"book-card fade-in\">\n        <div class=\"book-spine\" style=\"background: #d4c4a8;\">\n          <p class=\"book-spine-text\">集中力がすべてを解決する<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"book-info\">\n          <p class=\"book-title\">集中力がすべてを解決する<br>精神科医が教える「ゾーン」に入る方法<\u002Fp>\n          <p class=\"book-author\">樺沢 紫苑 著<\u002Fp>\n          <p class=\"book-note\">睡眠時間の確保と集中力の関係など、科学的なアプローチで「ゾーン」状態を作り出す方法を学べる一冊。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fade-in\">\n      <p class=\"section-eyebrow\">実践していること<\u002Fp>\n      <div class=\"insights-list\">\n        <div class=\"insight-item\">朝の集中できる時間帯に重要な作業を行う<\u002Fdiv>\n        <div class=\"insight-item\">昼食後は軽く歩いて眠気をリセットする<\u002Fdiv>\n        <div class=\"insight-item\">睡眠時間をしっかり確保する<\u002Fdiv>\n        <div class=\"insight-item\">ToDoリストで頭の中を整理する<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"section-divider\">\n\n<!-- OKABE -->\n<section class=\"person-section\">\n  <div class=\"person-inner\">\n    <div class=\"person-header fade-in\">\n      <div class=\"person-name-block\">\n        <p class=\"section-eyebrow\">02<\u002Fp>\n        <h2 class=\"person-name\">おかべさん<\u002Fh2>\n        <p class=\"person-theme\">人生観や価値観に影響を与えた本を紹介。相手を喜ばせる視点と、自分らしさを大切にすることへの気づきを共有しました。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"person-num\">02<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"books-list\">\n      <div class=\"book-card fade-in\">\n        <div class=\"book-spine\" style=\"background: #b5c4a8;\">\n          <p class=\"book-spine-text\">賢者の書<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"book-info\">\n          <p class=\"book-title\">賢者の書<\u002Fp>\n          <p class=\"book-author\">喜多川 泰 著<\u002Fp>\n          <p class=\"book-note\">相手を喜ばせる視点、自分だけの利益ではない考え方、豊かさが巡る感覚——人との関わり方や自分の在り方について深く考えさせられる一冊。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"book-card fade-in\">\n        <div class=\"book-spine\" style=\"background: #c4a8a8;\">\n          <p class=\"book-spine-text\">俺か、俺以外か。<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"book-info\">\n          <p class=\"book-title\">俺か、俺以外か。<br>ローランドという生き方<\u002Fp>\n          <p class=\"book-author\">ROLAND 著<\u002Fp>\n          <div class=\"book-note\">\n            自分を否定しそうになる時期に、「自分らしくあっていい」と背中を押してくれた一冊。自己肯定感に関する大切な気づきを与えてくれました。\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"section-divider\">\n\n<!-- KAORI -->\n<section class=\"person-section\">\n  <div class=\"person-inner\">\n    <div class=\"person-header fade-in\">\n      <div class=\"person-name-block\">\n        <p class=\"section-eyebrow\">03<\u002Fp>\n        <h2 class=\"person-name\">KAORIさん<\u002Fh2>\n        <p class=\"person-theme\">さまざまな人の自叙伝を愛読。コンプレックスや苦労をバネに、自分らしさを貫いた人物たちの生き様から学んでいます。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"person-num\">03<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fade-in\" style=\"margin-bottom: 40px;\">\n      <p class=\"section-eyebrow\">読んでいる人物<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;\">\n        <div style=\"background: var(--cream); border: 1px solid var(--tan); padding: 12px 20px; border-radius: 2px; font-family: var(--serif); font-size: 14px; color: var(--ink);\">冨永 愛<\u002Fdiv>\n        <div style=\"background: var(--cream); border: 1px solid var(--tan); padding: 12px 20px; border-radius: 2px; font-family: var(--serif); font-size: 14px; color: var(--ink);\">布袋 寅泰<\u002Fdiv>\n        <div style=\"background: var(--cream); border: 1px solid var(--tan); padding: 12px 20px; border-radius: 2px; font-family: var(--serif); font-size: 14px; color: var(--ink);\">長渕 剛<\u002Fdiv>\n        <div style=\"background: var(--cream); border: 1px solid var(--tan); padding: 12px 20px; border-radius: 2px; font-family: var(--serif); font-size: 14px; color: var(--ink);\">岡本 太郎<\u002Fdiv>\n        <div style=\"background: var(--cream); border: 1px solid var(--tan); padding: 12px 20px; border-radius: 2px; font-family: var(--serif); font-size: 14px; color: var(--ink);\">志村 けん<\u002Fdiv>\n        <div style=\"background: var(--cream); border: 1px solid var(--tan); padding: 12px 20px; border-radius: 2px; font-family: var(--serif); font-size: 14px; color: var(--ink);\">田中 角栄<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fade-in\">\n      <p class=\"section-eyebrow\">自叙伝から学ぶこと<\u002Fp>\n      <div class=\"insights-list\">\n        <div class=\"insight-item\">その人が何を考え、どう行動し、どう生きたのかを知る<\u002Fdiv>\n        <div class=\"insight-item\">コンプレックスからの飛躍、苦労や悔しさをバネにした姿<\u002Fdiv>\n        <div class=\"insight-item\">自分の時間感覚や行動パターンへの自己理解が深まる<\u002Fdiv>\n        <div class=\"insight-item\">子どもから親が育てられている、という温かい視点<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"section-divider\">\n\n<!-- EIICHI -->\n<section class=\"person-section\">\n  <div class=\"person-inner\">\n    <div class=\"person-header fade-in\">\n      <div class=\"person-name-block\">\n        <p class=\"section-eyebrow\">04<\u002Fp>\n        <h2 class=\"person-name\">えーいちさん<\u002Fh2>\n        <p class=\"person-theme\">途中参加ながら、休日の過ごし方を見直すきっかけになった一冊を紹介。メリハリをつけ、家族との時間を大切にする実践を共有しました。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"person-num\">04<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"books-list\">\n      <div class=\"book-card fade-in\">\n        <div class=\"book-spine\" style=\"background: #a8b5c4;\">\n          <p class=\"book-spine-text\">世界の一流は「休日」に何をしているのか<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"book-info\">\n          <p class=\"book-title\">世界の一流は「休日」に何をしているのか<br>年収が上がる週末の過ごし方<\u002Fp>\n          <p class=\"book-author\">越川 慎司 著<\u002Fp>\n          <p class=\"book-note\">土曜日はアクティブに、日曜日はゆっくり——メリハリをつけて家族の時間を大切にするきっかけになった一冊。新しいものを得るには、今あるものを取捨選択する必要がある、という気づきも。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- QUOTE -->\n<div class=\"quote-block\">\n  <div class=\"quote-inner\">\n    <p class=\"quote-text\">本は読むことがゴールではなく、<br>行動に移してこそ意味がある<\u002Fp>\n    <p class=\"quote-label\">全員の共通認識<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CYCLE DIAGRAM -->\n<section class=\"cycle-section\">\n  <div class=\"cycle-inner\">\n    <p class=\"section-eyebrow\">実践サイクル<\u002Fp>\n    <h2 class=\"cycle-title fade-in\">読んで、気づいて、動く。<\u002Fh2>\n    <p class=\"cycle-sub fade-in\">このサイクルを回すことが、自己成長や日々の変化につながる<\u002Fp>\n\n    <div class=\"cycle-steps fade-in\">\n      <div class=\"cycle-step\">\n        <div class=\"cycle-num\">読<\u002Fdiv>\n        <p class=\"cycle-step-label\">読む<\u002Fp>\n        <p class=\"cycle-step-desc\">本を通じて知識・視点を得る<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cycle-arrow\">→<\u002Fdiv>\n      <div class=\"cycle-step\">\n        <div class=\"cycle-num\">気<\u002Fdiv>\n        <p class=\"cycle-step-label\">気づく<\u002Fp>\n        <p class=\"cycle-step-desc\">自分への問いが生まれる<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cycle-arrow\">→<\u002Fdiv>\n      <div class=\"cycle-step\">\n        <div class=\"cycle-num\">試<\u002Fdiv>\n        <p class=\"cycle-step-label\">試してみる<\u002Fp>\n        <p class=\"cycle-step-desc\">小さな行動から始める<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cycle-arrow\">→<\u002Fdiv>\n      <div class=\"cycle-step\">\n        <div class=\"cycle-num\">振<\u002Fdiv>\n        <p class=\"cycle-step-label\">振り返る<\u002Fp>\n        <p class=\"cycle-step-desc\">うまくいったか確認する<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cycle-arrow\">→<\u002Fdiv>\n      <div class=\"cycle-step\">\n        <div class=\"cycle-num\">化<\u002Fdiv>\n        <p class=\"cycle-step-label\">自分化する<\u002Fp>\n        <p class=\"cycle-step-desc\">自分に合う形にカスタマイズ<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TOPICS -->\n<section class=\"section\">\n  <p class=\"section-eyebrow fade-in\">今回の会で広がったテーマ<\u002Fp>\n  <div class=\"topics-grid\">\n    <div class=\"topic-card fade-in\">\n      <div class=\"topic-icon\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <circle cx=\"8\" cy=\"8\" r=\"6\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Fcircle>\n          <path d=\"M8 5v4l2 2\" stroke=\"#8b6f4e\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"topic-name\">時間の使い方<\u002Fp>\n      <p class=\"topic-desc\">朝の集中時間の活用、睡眠確保、休日のメリハリなど、時間設計の重要性<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"topic-card fade-in\">\n      <div class=\"topic-icon\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <path d=\"M8 2C8 2 4 5 4 9a4 4 0 008 0c0-4-4-7-4-7z\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"topic-name\">好奇心と深掘り<\u002Fp>\n      <p class=\"topic-desc\">気になったことをすぐ調べ、興味が湧いたテーマを本で深く知っていく姿勢<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"topic-card fade-in\">\n      <div class=\"topic-icon\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <path d=\"M5 8a3 3 0 006 0\" stroke=\"#8b6f4e\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n          <circle cx=\"5\" cy=\"5\" r=\"1.5\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Fcircle>\n          <circle cx=\"11\" cy=\"5\" r=\"1.5\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"topic-name\">家族との関わり<\u002Fp>\n      <p class=\"topic-desc\">子どもとの時間、「ちょっと待って」という声かけが価値観に与える影響<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"topic-card fade-in\">\n      <div class=\"topic-icon\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <rect x=\"3\" y=\"3\" width=\"10\" height=\"10\" rx=\"1\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Frect>\n          <path d=\"M3 7h10\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Fpath>\n          <path d=\"M7 3v10\" stroke=\"#8b6f4e\" stroke-width=\"1.5\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"topic-name\">自分らしさ<\u002Fp>\n      <p class=\"topic-desc\">自己肯定感、コンプレックスとの向き合い方、自分の価値観を貫く生き方<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"topic-card fade-in\">\n      <div class=\"topic-icon\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <path d=\"M3 13l3-3 3 3 3-7 2 3\" stroke=\"#8b6f4e\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"topic-name\">行動変容<\u002Fp>\n      <p class=\"topic-desc\">読んだ内容を実際に試し、振り返り、自分に合う形に変えていく力<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"topic-card fade-in\">\n      <div class=\"topic-icon\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\">\n          <path d=\"M8 3v10M3 8h10\" stroke=\"#8b6f4e\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p class=\"topic-name\">豊かさの循環<\u002Fp>\n      <p class=\"topic-desc\">相手を喜ばせる視点、自分だけの利益ではない考え方が豊かさを生む<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- NEXT MEETING -->\n<section class=\"next-section\">\n  <div class=\"next-inner\">\n    <p class=\"next-label\">Next Meeting<\u002Fp>\n    <p class=\"next-date\">4月24日（金）<\u002Fp>\n    <p class=\"next-time\">21:00〜<\u002Fp>\n    <div class=\"next-divider\"><\u002Fdiv>\n    <p class=\"next-desc\">今回の会は「おすすめ本」の紹介からスタートし、時間の使い方・家族との関わり・自分らしさ・実践する力まで、日常や働き方にもつながる深いテーマに広がりました。本を通して、その人の価値観や考え方が見える、とても豊かな時間でした。<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>© 2026 ディスカッション会 · 内輪向け資料<\u002Ffooter>\n\n<script>\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('visible');\n      }\n    });\n  }, { threshold: 0.1 });\n\n  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
